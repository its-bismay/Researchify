<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ title }}</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; color: #1a1a1a; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 40px; }
    h1 { font-size: 28px; border-bottom: 3px solid #4f46e5; padding-bottom: 8px; }
    h2 { font-size: 20px; color: #4f46e5; margin-top: 32px; }
    img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
    a { color: #4f46e5; }
    .meta { color: #666; font-size: 13px; margin-bottom: 24px; }
    .content { font-size: 15px; }
    code { background: #f3f4f6; padding: 2px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <div class="meta">Topic: {{ topic }} &middot; Generated by AI Research Agent</div>
  <div class="content">
    {{ body_html | safe }}
  </div>
</body>
</html>
